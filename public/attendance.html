<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - UAS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .attendance-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .method-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }

        .method-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .method-card.active {
            border-color: #667eea;
            background: #e8f0fe;
        }

        .method-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .method-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .method-description {
            color: #666;
            font-size: 14px;
        }

        .attendance-form {
            display: none;
            margin-top: 30px;
        }

        .attendance-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn.checkout {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .recent-attendance {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e1e5e9;
        }

        .attendance-record {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info {
            flex: 1;
        }

        .record-name {
            font-weight: 600;
            color: #333;
        }

        .record-time {
            color: #666;
            font-size: 14px;
        }

        .record-type {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .record-type.checkin {
            background: #d4edda;
            color: #155724;
        }

        .record-type.checkout {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>
        
        <div class="header">
            <div class="logo">UAS</div>
            <h1>Mark Attendance</h1>
            <p class="subtitle">Check in or check out employees</p>
        </div>

        <div id="message" class="message"></div>

        <div class="attendance-methods">
            <div class="method-card" onclick="selectMethod('manual')">
                <div class="method-icon">👤</div>
                <div class="method-title">Manual Entry</div>
                <div class="method-description">Enter employee ID manually</div>
            </div>
            <div class="method-card" onclick="selectMethod('face')">
                <div class="method-icon">📷</div>
                <div class="method-title">Face Recognition</div>
                <div class="method-description">Use camera for face recognition (requires setup)</div>
            </div>
        </div>

        <!-- Manual Entry Form -->
        <div id="manual-form" class="attendance-form">
            <h3>Manual Attendance Entry</h3>
            <form id="manualAttendanceForm">
                <div class="form-group">
                    <label for="employeeId">Employee ID</label>
                    <input type="text" id="employeeId" name="employeeId" required>
                </div>
                <div class="form-group">
                    <label for="employeeName">Employee Name (Optional)</label>
                    <input type="text" id="employeeName" name="employeeName">
                </div>
                <button type="button" class="btn" onclick="markAttendance('checkin')">Check In</button>
                <button type="button" class="btn checkout" onclick="markAttendance('checkout')">Check Out</button>
            </form>
        </div>

        <!-- Face Recognition Form -->
        <div id="face-form" class="attendance-form">
            <h3>Face Recognition Attendance</h3>
            <div id="faceRecognitionContent">
                <!-- Camera Section -->
                <div class="camera-section" id="attendanceCameraSection" style="display: none;">
                    <video id="attendanceVideo" width="320" height="240" autoplay style="border-radius: 8px; margin-bottom: 10px; display: block; margin: 0 auto;"></video>
                    <canvas id="attendanceCanvas" width="320" height="240" style="display: none;"></canvas>
                    <div style="text-align: center; margin-bottom: 15px;">
                        <button type="button" class="btn" onclick="captureForAttendance()" id="attendanceCaptureBtn" style="width: auto; margin: 5px;">📷 Capture & Verify</button>
                        <button type="button" class="btn secondary" onclick="stopAttendanceCamera()" style="width: auto; margin: 5px;">Stop Camera</button>
                    </div>
                </div>
                
                <!-- Start Camera Button -->
                <div style="text-align: center; padding: 20px;">
                    <button type="button" class="btn" onclick="startAttendanceCamera()" id="startAttendanceCameraBtn">📷 Start Face Recognition</button>
                </div>
                
                <!-- Face Recognition Result -->
                <div id="faceRecognitionResult" style="display: none; text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px; margin-top: 15px;">
                    <div id="recognitionStatus"></div>
                    <div id="recognitionActions" style="margin-top: 15px;">
                        <button type="button" class="btn" onclick="markFaceAttendance('checkin')" id="faceCheckinBtn" style="width: auto; margin: 5px;">Check In</button>
                        <button type="button" class="btn checkout" onclick="markFaceAttendance('checkout')" id="faceCheckoutBtn" style="width: auto; margin: 5px;">Check Out</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Attendance -->
        <div class="recent-attendance">
            <h3>Recent Attendance</h3>
            <div id="recentAttendance">
                <p style="color: #666; text-align: center; padding: 20px;">Loading recent attendance...</p>
            </div>
        </div>
    </div>

    <script>
        let selectedMethod = null;
        let attendanceStream = null;
        let recognizedEmployee = null;

        function selectMethod(method) {
            // Remove active class from all cards
            document.querySelectorAll('.method-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Hide all forms
            document.querySelectorAll('.attendance-form').forEach(form => {
                form.classList.remove('active');
            });
            
            // Activate selected method
            event.target.closest('.method-card').classList.add('active');
            document.getElementById(method + '-form').classList.add('active');
            selectedMethod = method;
            
            // Check face recognition status when face method is selected
            if (method === 'face') {
                checkFaceRecognitionStatus();
            }
        }

        async function checkFaceRecognitionStatus() {
            try {
                const response = await fetch('/api/face/status');
                const result = await response.json();
                
                if (!result.initialized) {
                    document.getElementById('faceRecognitionContent').innerHTML = `
                        <div style="text-align: center; padding: 40px; background: #f8d7da; border-radius: 8px;">
                            <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
                            <p><strong>Face Recognition Not Available</strong></p>
                            <p style="font-size: 14px; color: #721c24; margin-top: 10px;">Face recognition service is not initialized. Please contact your administrator.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error checking face recognition status:', error);
            }
        }

        // Face Recognition Camera Functions
        async function startAttendanceCamera() {
            try {
                attendanceStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('attendanceVideo');
                video.srcObject = attendanceStream;
                document.getElementById('attendanceCameraSection').style.display = 'block';
                document.getElementById('startAttendanceCameraBtn').style.display = 'none';
            } catch (error) {
                showMessage('Camera access denied or not available: ' + error.message, 'error');
            }
        }

        function stopAttendanceCamera() {
            if (attendanceStream) {
                attendanceStream.getTracks().forEach(track => track.stop());
                attendanceStream = null;
            }
            document.getElementById('attendanceCameraSection').style.display = 'none';
            document.getElementById('startAttendanceCameraBtn').style.display = 'inline-block';
            document.getElementById('faceRecognitionResult').style.display = 'none';
            recognizedEmployee = null;
        }

        async function captureForAttendance() {
            const video = document.getElementById('attendanceVideo');
            const canvas = document.getElementById('attendanceCanvas');
            const ctx = canvas.getContext('2d');
            
            // Capture the image
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to blob and send for verification
            canvas.toBlob(async function(blob) {
                const formData = new FormData();
                formData.append('image', blob, 'capture.jpg');
                
                document.getElementById('attendanceCaptureBtn').disabled = true;
                document.getElementById('attendanceCaptureBtn').textContent = 'Verifying...';
                
                try {
                    const response = await fetch('/api/face/verify', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        recognizedEmployee = result.employee;
                        document.getElementById('recognitionStatus').innerHTML = `
                            <div style="color: #155724; font-weight: 600; margin-bottom: 10px;">✅ Employee Recognized</div>
                            <div><strong>Name:</strong> ${result.employee.name}</div>
                            <div><strong>ID:</strong> ${result.employee.id}</div>
                            <div><strong>Confidence:</strong> ${Math.round(result.confidence * 100)}%</div>
                        `;
                        document.getElementById('faceRecognitionResult').style.display = 'block';
                    } else {
                        document.getElementById('recognitionStatus').innerHTML = `
                            <div style="color: #721c24; font-weight: 600; margin-bottom: 10px;">❌ Face Not Recognized</div>
                            <div>${result.error}</div>
                            <div style="margin-top: 10px; font-size: 14px;">Please try again or use manual entry.</div>
                        `;
                        document.getElementById('faceRecognitionResult').style.display = 'block';
                        document.getElementById('recognitionActions').style.display = 'none';
                    }
                } catch (error) {
                    showMessage('Face verification failed: ' + error.message, 'error');
                } finally {
                    document.getElementById('attendanceCaptureBtn').disabled = false;
                    document.getElementById('attendanceCaptureBtn').textContent = '📷 Capture & Verify';
                }
            }, 'image/jpeg', 0.8);
        }

        async function markFaceAttendance(type) {
            if (!recognizedEmployee) {
                showMessage('No employee recognized', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/attendance/${type}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        employeeId: recognizedEmployee.id,
                        employeeName: recognizedEmployee.name
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`${type.charAt(0).toUpperCase() + type.slice(1)} successful for ${recognizedEmployee.name}!`, 'success');
                    loadRecentAttendance();
                    stopAttendanceCamera();
                } else {
                    showMessage(result.error || `${type} failed`, 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
        }

        // Manual Attendance Functions
        async function markAttendance(type) {
            const employeeId = document.getElementById('employeeId').value;
            const employeeName = document.getElementById('employeeName').value;
            
            if (!employeeId) {
                showMessage('Please enter Employee ID', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/attendance/${type}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        employeeId: employeeId,
                        employeeName: employeeName || 'Unknown'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(result.message, 'success');
                    document.getElementById('manualAttendanceForm').reset();
                    loadRecentAttendance();
                } else {
                    showMessage(result.error || `${type} failed`, 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
        }

        async function loadRecentAttendance() {
            try {
                const response = await fetch('/api/attendance?limit=10');
                const result = await response.json();
                
                const container = document.getElementById('recentAttendance');
                
                if (result.success && result.records.length > 0) {
                    container.innerHTML = result.records.map(record => `
                        <div class="attendance-record">
                            <div class="record-info">
                                <div class="record-name">${record.employeeName} (${record.employeeId})</div>
                                <div class="record-time">${new Date(record.timestamp).toLocaleString()}</div>
                            </div>
                            <div class="record-type ${record.type}">${record.type.toUpperCase()}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No recent attendance records</p>';
                }
            } catch (error) {
                document.getElementById('recentAttendance').innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">Error loading attendance records</p>';
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Cleanup camera on page unload
        window.addEventListener('beforeunload', function() {
            stopAttendanceCamera();
        });

        // Load recent attendance on page load
        loadRecentAttendance();
    </script>
</body>
</html>
